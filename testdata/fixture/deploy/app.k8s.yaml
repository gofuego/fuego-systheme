apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: fixture
  labels: { app: fixture }
spec:
  replicas: 1
  selector:
    matchLabels: { app: fixture }
  template:
    metadata:
      labels: { app: fixture }
    spec:
      containers:
        - name: app
          image: fixture/app:0.1.0
          ports:
            - containerPort: 8080
