<aside class="filetree">
  <nav aria-label="Repository files">
    {{range .Page.Envelope.nav}}{{template "navnode" (dict "n" . "cur" $.Page.URL "base" $.Site.BaseURL)}}{{end}}
  </nav>
</aside>
{{define "navnode"}}{{if .n.children}}<details class="tree-dir">
  <summary><span class="tree-row">{{.n.name}}</span></summary>
  <div class="tree-children">
    {{range .n.children}}{{template "navnode" (dict "n" . "cur" $.cur "base" $.base)}}{{end}}
  </div>
</details>{{else}}<a class="tree-file ft-{{.n.type}}{{if eq .n.url .cur}} is-current{{end}}" href="{{.base}}{{.n.url}}"><span class="tree-row">{{.n.name}}</span></a>{{end}}{{end}}
